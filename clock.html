<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock - Multiple Time Zones</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="clock-styles.css">
</head>
<body>
    <div class="clock-container">
        <!-- Header -->
        <div class="clock-header">
            <h1><i class="fas fa-clock"></i> Digital Clock</h1>
            <p>Current time in different time zones</p>
        </div>

        <!-- Controls -->
        <div class="controls">
            <div class="search-box">
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="🔍 Search timezone..."
                    class="search-input"
                >
            </div>
            <button id="addTimezoneBtn" class="btn-add">
                <i class="fas fa-plus"></i> Add Timezone
            </button>
        </div>

        <!-- Main Clock Display -->
        <div class="main-clock-section">
            <div class="main-clock">
                <div class="time-display" id="mainTime">00:00:00</div>
                <div class="timezone-info">
                    <span id="mainTimezone">UTC+0</span>
                    <span id="mainDate" class="date">Monday, January 1, 2024</span>
                </div>
            </div>
        </div>

        <!-- Timezone Clocks Grid -->
        <div class="timezones-grid" id="timezonesGrid">
            <!-- Clock cards will be dynamically inserted here -->
        </div>

        <!-- Add Timezone Modal -->
        <div class="modal" id="timezoneModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Add New Timezone</h2>
                    <button class="close-btn" id="closeModalBtn">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="search-modal">
                        <input 
                            type="text" 
                            id="modalSearch" 
                            placeholder="Search timezone..."
                            class="search-input"
                        >
                    </div>
                    <div class="timezone-list" id="timezoneList">
                        <!-- Timezone options will be inserted here -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Settings Panel -->
        <div class="settings-panel">
            <button id="settingsBtn" class="settings-btn">
                <i class="fas fa-cog"></i>
            </button>
            <div class="settings-menu" id="settingsMenu">
                <div class="settings-item">
                    <label for="format24">
                        <input type="checkbox" id="format24" checked>
                        <span>24-Hour Format</span>
                    </label>
                </div>
                <div class="settings-item">
                    <label for="showSeconds">
                        <input type="checkbox" id="showSeconds" checked>
                        <span>Show Seconds</span>
                    </label>
                </div>
                <div class="settings-item">
                    <label for="darkMode">
                        <input type="checkbox" id="darkMode">
                        <span>Dark Mode</span>
                    </label>
                </div>
                <hr>
                <button id="resetBtn" class="btn-reset">
                    <i class="fas fa-redo"></i> Reset to Default
                </button>
            </div>
        </div>
    </div>

    <script src="clock-script.js"></script>
</body>
</html>
